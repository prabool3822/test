# This nginx.conf is used INSIDE the frontend Docker container
# When running with docker-compose, 'backend' resolves to the backend container
server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 'backend' is the service name in docker-compose.yml
        # Docker's internal DNS resolves it automatically!
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend:3001/health;
    }
}
