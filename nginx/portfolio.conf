# =====================================================
# Nginx config for Portfolio App
# This is what "path-based routing" looks like in real life
# /api/* goes to backend (Node.js on port 3001)
# everything else goes to frontend (static files)
# =====================================================

server {
    listen 80;
    server_name _;   # catches any domain/IP - change to your domain later

    # ---- Logging (important for debugging in DevOps) ----
    access_log /var/log/nginx/portfolio-access.log;
    error_log  /var/log/nginx/portfolio-error.log;

    # ---- Frontend: serve static files ----
    location / {
        root /var/www/portfolio/frontend;
        index index.html;
        # This makes single-page-app routing work
        try_files $uri $uri/ /index.html;
    }

    # ---- Backend: proxy API requests ----
    # Any request starting with /api goes to Node.js
    location /api/ {
        proxy_pass http://localhost:3001;

        # These headers tell Node.js the real client IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ---- Health check endpoint ----
    location /health {
        proxy_pass http://localhost:3001/health;
        proxy_set_header Host $host;
    }

    # ---- Security headers (good practice) ----
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ---- Gzip compression (makes site faster) ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
