# =====================================================
# docker-compose.yml
# This file defines ALL services and runs them together
# Command to run everything: docker-compose up -d
# Command to stop everything: docker-compose down
# =====================================================

version: '3.8'

services:
  backend:
    image: prabool3822/backend:latest
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - ./backend/data:/app/data
    networks:
      - portfolio-network
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: prabool3822/frontend:latest
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
