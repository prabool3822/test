# =====================================================
# docker-compose.yml
# This file defines ALL services and runs them together
# Command to run everything: docker-compose up -d
# Command to stop everything: docker-compose down
# =====================================================

services:
  backend:
    image: prabool3822/portfolio-backend:latest
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - ./backend/data:/app/data
    networks:
      - portfolio-network
    expose:
      - "3001"

  frontend:
    image: prabool3822/portfolio-frontend:latest
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
